version: "3.9"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  forensics_net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: forensics-postgres
    restart: unless-stopped
    networks:
      - forensics_net
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forensics_db}
      POSTGRES_USER: ${POSTGRES_USER:-forensics_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: forensics-redis
    restart: unless-stopped
    networks:
      - forensics_net
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: forensics-rabbitmq
    restart: unless-stopped
    networks:
      - forensics_net
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-forensics}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: forensics-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - forensics_net
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
