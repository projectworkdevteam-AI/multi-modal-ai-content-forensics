# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = shared/db/alembic

# template used to generate migration file names
# file_template = %%(rev)s_%%(slug)s

# sys.path path, direct or relative to this file
prepend_sys_path = .

# logging configuration is managed below

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
